name: Feature Request
description: 提出一个新功能建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请尽可能详细地填写以下信息。
  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 你的功能建议是否与某个问题相关？请描述
      placeholder: 我经常感到困扰的是...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案
      description: 你希望发生什么
      placeholder: 我希望能够...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 有没有其他替代方案或变通方法？
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 前端
        - 后端
        - 全栈
        - 文档
        - 其他
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 关于这个功能建议的任何其他信息，例如截图、mockup 等
