name: Bug Report
description: 报告一个 bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 bug！请尽可能详细地填写以下信息。
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰简洁地描述这个 bug
      placeholder: 当我尝试...时，发生了...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个 bug
      value: |
        1. 进入 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 看到错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: 环境
      options:
        - 生产环境
        - 开发环境
        - 测试环境
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python 版本
      placeholder: "3.10.0"
  - type: input
    id: node-version
    attributes:
      label: Node.js 版本
      placeholder: "16.0.0"
  - type: input
    id: browser
    attributes:
      label: 浏览器（如果是前端问题）
      placeholder: "Chrome 120"
  - type: textarea
    id: logs
    attributes:
      label: 相关日志输出
      description: 请复制粘贴任何相关的日志输出
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果可以，添加截图以帮助解释你的问题
  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 关于这个问题的任何其他信息
