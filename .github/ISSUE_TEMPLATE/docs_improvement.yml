name: Documentation Improvement
description: 提出文档改进建议
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你帮助改进我们的文档！
  - type: textarea
    id: current
    attributes:
      label: 当前文档问题
      description: 描述当前文档存在的问题
      placeholder: 文档中...部分不清晰/有错误
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: 改进建议
      description: 你建议如何改进
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: 文档位置
      description: 提供相关文档的链接或路径
  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息
