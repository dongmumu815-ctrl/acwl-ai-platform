version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: acwl-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-acwl-ai-data}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acwl-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: acwl-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acwl-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: acwl-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - acwl-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acwl-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    ports:
      - "${BACKEND_PORT:-8082}:8082"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
      - ./backend/datasets:/app/datasets
      - ./backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - acwl-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acwl-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - acwl-network

  # Celery Worker (optional)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acwl-celery-worker
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
      - ./backend/datasets:/app/datasets
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - acwl-network

  # Celery Flower (monitoring)
  celery-flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acwl-celery-flower
    restart: always
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: redis
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
    networks:
      - acwl-network

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  acwl-network:
    driver: bridge
