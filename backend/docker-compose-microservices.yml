version: '3.8'

services:
  # 调度器服务
  scheduler:
    build: .
    image: acwl-backend-microservice:latest
    container_name: acwl-scheduler-01
    environment:
      - SERVICE_TYPE=scheduler
      - NODE_ID=scheduler-01
      - PORT=8002
      # 数据库连接配置 (请根据实际情况修改)
      - MYSQL_HOST=${MYSQL_HOST:-10.20.1.200}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-2wsx1QAZaczt}
      - MYSQL_DB=${MYSQL_DB:-acwl-ai-data}
      # Redis/Celery 配置
      - REDIS_HOST=${REDIS_HOST:-10.20.1.200}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://10.20.1.200:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://10.20.1.200:6379/2}
      # 日志级别
      - LOG_LEVEL=INFO
    ports:
      - "8002:8002"
    volumes:
      - ./logs/scheduler:/app/logs
    restart: unless-stopped

  # 默认分组执行器
  executor-default:
    image: acwl-backend-microservice:latest
    environment:
      - SERVICE_TYPE=executor
      - NODE_ID=executor-default-01
      - PORT=8011
      - GROUP_ID=default # 兼容旧配置
      - GROUP_NAMES=default # 新多分组配置
      - MYSQL_HOST=${MYSQL_HOST:-10.20.1.200}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-2wsx1QAZaczt}
      - MYSQL_DB=${MYSQL_DB:-acwl-ai-data}
      - REDIS_HOST=${REDIS_HOST:-10.20.1.200}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://10.20.1.200:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://10.20.1.200:6379/2}
    volumes:
      - ./logs/executor-default:/app/logs
      - ./workspace:/app/workspace
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  executor-high-perf:
    image: acwl-backend-microservice:latest
    environment:
      - SERVICE_TYPE=executor
      - NODE_ID=executor-high-perf-01
      - PORT=8012
      - GROUP_ID=high-performance # 兼容旧配置
      - GROUP_NAMES=high-performance,default # 新多分组配置，示例：同时属于高性能组和默认组
      - MYSQL_HOST=${MYSQL_HOST:-10.20.1.200}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-2wsx1QAZaczt}
      - MYSQL_DB=${MYSQL_DB:-acwl-ai-data}
      - REDIS_HOST=${REDIS_HOST:-10.20.1.200}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://10.20.1.200:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://10.20.1.200:6379/2}
    volumes:
      - ./logs/executor-high-perf:/app/logs
      - ./workspace:/app/workspace
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: acwl-network
    driver: bridge
