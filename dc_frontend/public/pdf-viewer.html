<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css" />
    <style>
      html, body { height: 100%; margin: 0; }
      #viewerContainer { position: absolute; inset: 0; overflow: auto; background: #f5f7fa; }
      /* 加载遮罩 */
      #loadingOverlay {
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.92);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 10000;
        color: #606266;
        font-family: Arial, Helvetica, sans-serif;
      }
      .spinner {
        width: 44px;
        height: 44px;
        border: 4px solid #faad14;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin-bottom: 12px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #loadingText { font-size: 14px; }
      /* 统一与检索列表的高亮配色（加深） */
      .textLayer .highlight {
        background-color: #faad14 !important;
        color: #5b3c00 !important;
        border-radius: 2px;
        padding: 0 1px;
        border: 1px solid #d48806 !important;
        opacity: 1 !important;
        mix-blend-mode: normal !important;
      }
      .textLayer .highlight.selected {
        background-color: #fa8c16 !important;
        color: #3f2600 !important;
        border-color: #d46b08 !important;
      }
    </style>
  </head>
  <body>
    <div id="viewerContainer">
      <div id="viewer" class="pdfViewer"></div>
    </div>
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <div id="loadingText">正在加载…</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>
    <script>
      (function() {
        var params = new URLSearchParams(location.search);
        var file = params.get('file');
        var hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
        var page = parseInt(hashParams.get('page') || params.get('page') || '1', 10);
        var query = hashParams.get('search') || params.get('search') || params.get('q') || '';
        if (!file) { document.body.innerHTML = '<div style="padding:16px;color:#606266;">缺少 file 参数</div>'; return; }
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        var eventBus = new pdfjsViewer.EventBus();
        var container = document.getElementById('viewerContainer');
        var linkService = new pdfjsViewer.PDFLinkService({ eventBus: eventBus });
        var findController = new pdfjsViewer.PDFFindController({ eventBus: eventBus, linkService: linkService });
        var viewer = new pdfjsViewer.PDFViewer({
          container: container,
          viewer: document.getElementById('viewer'),
          eventBus: eventBus,
          linkService: linkService,
          findController: findController,
          textLayerMode: 2
        });
        linkService.setViewer(viewer);
        eventBus.on('pagesinit', function () {
          viewer.currentScaleValue = 'page-width';
          if (Number.isFinite(page) && page > 0) { viewer.currentPageNumber = page; }
          if (query && query.trim()) {
            eventBus.dispatch('find', {
              source: window,
              type: 'find',
              query: query,
              phraseSearch: true,
              caseSensitive: false,
              entireWord: false,
              highlightAll: true,
              findPrevious: false
            });
          }
          var overlay = document.getElementById('loadingOverlay');
          if (overlay) overlay.style.display = 'none';
        });
        var loadingTask = pdfjsLib.getDocument({ url: file, withCredentials: false });
        try {
          loadingTask.onProgress = function (e) {
            var overlay = document.getElementById('loadingOverlay');
            var text = document.getElementById('loadingText');
            if (overlay && text && e && e.total) {
              var pct = Math.round(e.loaded * 100 / e.total);
              text.textContent = '正在加载… ' + pct + '%';
            }
          };
        } catch (_) {}
        loadingTask.promise.then(function (pdfDocument) {
          viewer.setDocument(pdfDocument);
          linkService.setDocument(pdfDocument, null);
          var overlay = document.getElementById('loadingOverlay');
          if (overlay) overlay.style.display = 'none';
        }).catch(function (reason) {
          var overlay = document.getElementById('loadingOverlay');
          var spinner = document.querySelector('.spinner');
          var text = document.getElementById('loadingText');
          if (overlay && text) {
            if (spinner) spinner.style.display = 'none';
            text.textContent = 'PDF 加载失败：' + String(reason);
          } else {
            container.innerHTML = '<div style="padding:16px;color:#c45656;">PDF 加载失败：' + String(reason) + '</div>';
          }
        });
      })();
    </script>
  </body>
</html>
