<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css" />
    <style>
      html, body { height: 100%; margin: 0; }
      #viewerContainer { position: absolute; inset: 0; overflow: auto; background: #f5f7fa; }
      /* 统一与检索列表的高亮配色 */
      .textLayer .highlight {
        background-color: #0ce646 !important;
        color: #856404 !important;
        border-radius: 2px;
        padding: 0 1px;
        mix-blend-mode: normal;
      }
      .textLayer .highlight.selected {
        background-color: #0ce646 !important;
      }
    </style>
  </head>
  <body>
    <div id="viewerContainer">
      <div id="viewer" class="pdfViewer"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>
    <script>
      (function() {
        var params = new URLSearchParams(location.search);
        var file = params.get('file');
        var hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
        var page = parseInt(hashParams.get('page') || params.get('page') || '1', 10);
        var query = hashParams.get('search') || params.get('search') || params.get('q') || '';
        if (!file) { document.body.innerHTML = '<div style="padding:16px;color:#606266;">缺少 file 参数</div>'; return; }
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        var eventBus = new pdfjsViewer.EventBus();
        var container = document.getElementById('viewerContainer');
        var linkService = new pdfjsViewer.PDFLinkService({ eventBus: eventBus });
        var findController = new pdfjsViewer.PDFFindController({ eventBus: eventBus, linkService: linkService });
        var viewer = new pdfjsViewer.PDFViewer({
          container: container,
          viewer: document.getElementById('viewer'),
          eventBus: eventBus,
          linkService: linkService,
          findController: findController,
          textLayerMode: 2
        });
        linkService.setViewer(viewer);
        eventBus.on('pagesinit', function () {
          viewer.currentScaleValue = 'page-width';
          if (Number.isFinite(page) && page > 0) { viewer.currentPageNumber = page; }
          if (query && query.trim()) {
            eventBus.dispatch('find', {
              source: window,
              type: 'find',
              query: query,
              phraseSearch: true,
              caseSensitive: false,
              entireWord: false,
              highlightAll: true,
              findPrevious: false
            });
          }
        });
        var loadingTask = pdfjsLib.getDocument({ url: file, withCredentials: false });
        loadingTask.promise.then(function (pdfDocument) {
          viewer.setDocument(pdfDocument);
          linkService.setDocument(pdfDocument, null);
        }).catch(function (reason) {
          container.innerHTML = '<div style="padding:16px;color:#c45656;">PDF 加载失败：' + String(reason) + '</div>';
        });
      })();
    </script>
  </body>
</html>
