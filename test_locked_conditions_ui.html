<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锁定条件功能测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 24px;
        }
        
        h1 {
            color: #303133;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ebeef5;
            border-radius: 6px;
        }
        
        .section h3 {
            margin-top: 0;
            color: #409eff;
            border-bottom: 2px solid #409eff;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #606266;
        }
        
        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        button {
            background-color: #409eff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        
        button:hover {
            background-color: #337ecc;
        }
        
        button:disabled {
            background-color: #c0c4cc;
            cursor: not-allowed;
        }
        
        .required {
            color: #f56c6c;
        }
        
        .condition-group {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 6px;
        }
        
        .locked-conditions {
            background-color: #fef0f0;
            border: 1px solid #fbc4c4;
        }
        
        .required-conditions {
            background-color: #fdf6ec;
            border: 1px solid #f5dab1;
        }
        
        .optional-conditions {
            background-color: #f4f4f5;
            border: 1px solid #e4e7ed;
        }
        
        .condition-group h4 {
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .locked-input {
            background-color: #f5f7fa !important;
            color: #909399 !important;
            cursor: not-allowed;
        }
        
        .locked-display {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .lock-icon {
            color: #f56c6c;
            font-size: 16px;
        }
        
        .locked-reason {
            font-size: 12px;
            color: #909399;
            font-style: italic;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background-color: #f0f9ff;
            border: 1px solid #b3d8ff;
        }
        
        .error {
            background-color: #fef0f0;
            border: 1px solid #fbc4c4;
            color: #f56c6c;
        }
        
        .success {
            background-color: #f0f9ff;
            border: 1px solid #b3d8ff;
            color: #409eff;
        }
        
        pre {
            background-color: #f5f7fa;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 锁定条件功能测试</h1>
        
        <!-- 模板选择 -->
        <div class="section">
            <h3>📋 选择模板</h3>
            <div class="form-group">
                <label for="templateSelect">选择SQL模板:</label>
                <select id="templateSelect" onchange="loadTemplate()">
                    <option value="">请选择模板...</option>
                </select>
            </div>
            <button onclick="loadTemplates()">🔄 刷新模板列表</button>
        </div>
        
        <!-- 条件配置 -->
        <div class="section" id="conditionSection" style="display: none;">
            <h3>⚙️ 条件配置</h3>
            <div id="conditionForm"></div>
            <button onclick="executeQuery()" id="executeBtn">🚀 执行查询</button>
        </div>
        
        <!-- 结果显示 -->
        <div class="section" id="resultSection" style="display: none;">
            <h3>📊 查询结果</h3>
            <div id="queryResult"></div>
        </div>
    </div>

    <script>
        let currentTemplate = null;
        let authToken = null;
        
        // 页面加载时获取认证token并加载模板
        window.onload = async function() {
            await getAuthToken();
            await loadTemplates();
        };
        
        /**
         * 获取认证token
         */
        async function getAuthToken() {
            try {
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                if (data.access_token) {
                    authToken = data.access_token;
                    console.log('✅ 认证成功');
                } else {
                    throw new Error('认证失败');
                }
            } catch (error) {
                console.error('❌ 认证失败:', error);
                showResult('认证失败: ' + error.message, 'error');
            }
        }
        
        /**
         * 加载模板列表
         */
        async function loadTemplates() {
            if (!authToken) {
                showResult('请先进行认证', 'error');
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/sql-query/templates?isTemplate=true', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                const select = document.getElementById('templateSelect');
                select.innerHTML = '<option value="">请选择模板...</option>';
                
                if (data.data && data.data.length > 0) {
                    data.data.forEach(template => {
                        const option = document.createElement('option');
                        option.value = template.id;
                        option.textContent = `${template.name} (ID: ${template.id})`;
                        select.appendChild(option);
                    });
                    console.log(`✅ 加载了 ${data.data.length} 个模板`);
                } else {
                    console.log('⚠️ 没有找到模板');
                }
            } catch (error) {
                console.error('❌ 加载模板失败:', error);
                showResult('加载模板失败: ' + error.message, 'error');
            }
        }
        
        /**
         * 加载选中的模板
         */
        async function loadTemplate() {
            const templateId = document.getElementById('templateSelect').value;
            if (!templateId) {
                document.getElementById('conditionSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'none';
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/v1/sql-query/templates/${templateId}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                if (data.data) {
                    currentTemplate = data.data;
                    console.log('📋 加载模板:', currentTemplate);
                    generateConditionForm(currentTemplate.config);
                    document.getElementById('conditionSection').style.display = 'block';
                } else {
                    throw new Error('模板数据无效');
                }
            } catch (error) {
                console.error('❌ 加载模板失败:', error);
                showResult('加载模板失败: ' + error.message, 'error');
            }
        }
        
        /**
         * 生成条件表单
         */
        function generateConditionForm(config) {
            const container = document.getElementById('conditionForm');
            container.innerHTML = '';
            
            if (!config || (!config.requiredConditions && !config.optionalConditions && !config.lockedConditions)) {
                container.innerHTML = '<p>此模板没有配置条件</p>';
                return;
            }
            
            // 锁定条件
            if (config.lockedConditions && config.lockedConditions.length > 0) {
                const lockedDiv = document.createElement('div');
                lockedDiv.className = 'condition-group locked-conditions';
                lockedDiv.innerHTML = '<h4><span class="lock-icon">🔒</span>锁定条件</h4>';
                
                config.lockedConditions.forEach(condition => {
                    const conditionDiv = document.createElement('div');
                    conditionDiv.className = 'form-group';
                    
                    const displayValue = getDisplayValue(condition);
                    
                    conditionDiv.innerHTML = `
                        <label>${condition.label}:</label>
                        <div class="locked-display">
                            <input type="text" value="${displayValue}" class="locked-input" readonly>
                            <span class="lock-icon">🔒</span>
                        </div>
                        ${condition.reason ? `<div class="locked-reason">锁定原因: ${condition.reason}</div>` : ''}
                    `;
                    
                    lockedDiv.appendChild(conditionDiv);
                });
                
                container.appendChild(lockedDiv);
            }
            
            // 必填条件
            if (config.requiredConditions && config.requiredConditions.length > 0) {
                const requiredDiv = document.createElement('div');
                requiredDiv.className = 'condition-group required-conditions';
                requiredDiv.innerHTML = '<h4><span style="color: #e6a23c;">●</span>必填条件</h4>';
                
                config.requiredConditions.forEach(condition => {
                    requiredDiv.appendChild(createConditionInput(condition, true));
                });
                
                container.appendChild(requiredDiv);
            }
            
            // 可选条件
            if (config.optionalConditions && config.optionalConditions.length > 0) {
                const optionalDiv = document.createElement('div');
                optionalDiv.className = 'condition-group optional-conditions';
                optionalDiv.innerHTML = '<h4><span style="color: #909399;">○</span>可选条件</h4>';
                
                config.optionalConditions.forEach(condition => {
                    optionalDiv.appendChild(createConditionInput(condition, false));
                });
                
                container.appendChild(optionalDiv);
            }
        }
        
        /**
         * 创建条件输入框
         */
        function createConditionInput(condition, required) {
            const div = document.createElement('div');
            div.className = 'form-group';
            
            let html = `<label for="condition_${condition.field}">${condition.label}`;
            if (required) {
                html += ' <span class="required">*</span>';
            }
            html += ':</label>';
            
            if (condition.type === 'select') {
                html += `<select id="condition_${condition.field}" data-field="${condition.field}">`;
                if (!required) {
                    html += '<option value="">请选择...</option>';
                }
                if (condition.options) {
                    condition.options.forEach(option => {
                        const selected = option.value === condition.defaultValue ? 'selected' : '';
                        html += `<option value="${option.value}" ${selected}>${option.label}</option>`;
                    });
                }
                html += '</select>';
            } else if (condition.type === 'date') {
                const defaultValue = condition.defaultValue || '';
                html += `<input type="date" id="condition_${condition.field}" data-field="${condition.field}" value="${defaultValue}">`;
            } else if (condition.type === 'number') {
                const defaultValue = condition.defaultValue || '';
                html += `<input type="number" id="condition_${condition.field}" data-field="${condition.field}" value="${defaultValue}" placeholder="${condition.placeholder || ''}">`;
            } else {
                const defaultValue = condition.defaultValue || '';
                html += `<input type="text" id="condition_${condition.field}" data-field="${condition.field}" value="${defaultValue}" placeholder="${condition.placeholder || ''}">`;
            }
            
            div.innerHTML = html;
            return div;
        }
        
        /**
         * 获取显示值
         */
        function getDisplayValue(condition) {
            if (condition.type === 'select' && condition.options) {
                const option = condition.options.find(opt => opt.value === condition.lockedValue);
                return option ? option.label : condition.lockedValue;
            }
            return condition.lockedValue;
        }
        
        /**
         * 执行查询
         */
        async function executeQuery() {
            if (!currentTemplate) {
                showResult('请先选择模板', 'error');
                return;
            }
            
            // 收集条件值
            const conditions = {};
            
            // 收集锁定条件的值
            if (currentTemplate.config && currentTemplate.config.lockedConditions) {
                currentTemplate.config.lockedConditions.forEach(condition => {
                    conditions[condition.field] = condition.lockedValue;
                });
            }
            
            // 收集用户输入的条件值
            const inputs = document.querySelectorAll('#conditionForm input[data-field], #conditionForm select[data-field]');
            inputs.forEach(input => {
                const field = input.getAttribute('data-field');
                const value = input.value;
                if (value !== '') {
                    conditions[field] = value;
                }
            });
            
            console.log('📝 查询条件:', conditions);
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/sql-query/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        templateId: currentTemplate.id,
                        conditions: conditions
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('查询执行成功！', 'success');
                    console.log('✅ 查询结果:', data);
                    
                    // 显示查询详情
                    const resultDiv = document.getElementById('queryResult');
                    resultDiv.innerHTML = `
                        <h4>查询详情:</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                        <h4>使用的条件:</h4>
                        <pre>${JSON.stringify(conditions, null, 2)}</pre>
                    `;
                    document.getElementById('resultSection').style.display = 'block';
                } else {
                    throw new Error(data.detail || '查询执行失败');
                }
            } catch (error) {
                console.error('❌ 查询执行失败:', error);
                showResult('查询执行失败: ' + error.message, 'error');
            }
        }
        
        /**
         * 显示结果消息
         */
        function showResult(message, type = 'success') {
            const resultDiv = document.getElementById('queryResult');
            resultDiv.innerHTML = `<div class="${type}">${message}</div>`;
            document.getElementById('resultSection').style.display = 'block';
        }
    </script>
</body>
</html>
