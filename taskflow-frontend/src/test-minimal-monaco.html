<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最小化 Monaco Editor 测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #container {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
        }
        .controls {
            margin-bottom: 10px;
        }
        button {
            margin-right: 10px;
            padding: 5px 10px;
        }
        .log {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>最小化 Monaco Editor 测试</h1>
    
    <div class="controls">
        <button onclick="createEditor()">创建编辑器</button>
        <button onclick="destroyEditor()">销毁编辑器</button>
        <button onclick="getValue()">获取内容</button>
        <button onclick="setValue()">设置内容</button>
        <button onclick="clearLog()">清空日志</button>
    </div>
    
    <div id="container"></div>
    
    <div class="log" id="log"></div>

    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        let editor = null;
        
        function log(message) {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}<br>`;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        function createEditor() {
            log('开始创建 Monaco Editor...');
            
            if (editor) {
                log('编辑器已存在，先销毁');
                destroyEditor();
            }
            
            require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } });
            
            require(['vs/editor/editor.main'], function () {
                log('Monaco Editor 模块加载完成');
                
                try {
                    editor = monaco.editor.create(document.getElementById('container'), {
                        value: 'print("Hello, Monaco Editor!")\n# 这是一个简单的 Python 代码示例',
                        language: 'python',
                        theme: 'vs-dark',
                        automaticLayout: false,
                        minimap: { enabled: false },
                        scrollBeyondLastLine: false,
                        wordWrap: 'on'
                    });
                    
                    log('编辑器实例创建成功');
                    
                    // 添加内容变化监听器（最简单的版本）
                    editor.onDidChangeModelContent(() => {
                        log('内容发生变化');
                    });
                    
                    log('监听器设置完成');
                    
                    // 手动触发布局
                    setTimeout(() => {
                        if (editor) {
                            editor.layout();
                            log('编辑器布局完成');
                        }
                    }, 100);
                    
                } catch (error) {
                    log('创建编辑器失败: ' + error.message);
                    console.error('创建编辑器失败:', error);
                }
            });
        }
        
        function destroyEditor() {
            if (editor) {
                log('开始销毁编辑器...');
                try {
                    editor.dispose();
                    editor = null;
                    log('编辑器销毁成功');
                } catch (error) {
                    log('销毁编辑器失败: ' + error.message);
                    console.error('销毁编辑器失败:', error);
                }
            } else {
                log('编辑器不存在，无需销毁');
            }
        }
        
        function getValue() {
            if (editor) {
                try {
                    const value = editor.getValue();
                    log('获取内容成功，长度: ' + value.length);
                    console.log('编辑器内容:', value);
                } catch (error) {
                    log('获取内容失败: ' + error.message);
                }
            } else {
                log('编辑器不存在');
            }
        }
        
        function setValue() {
            if (editor) {
                try {
                    const newValue = 'def hello_world():\n    print("Hello from Monaco Editor!")\n    return "success"\n\nhello_world()';
                    editor.setValue(newValue);
                    log('设置内容成功');
                } catch (error) {
                    log('设置内容失败: ' + error.message);
                }
            } else {
                log('编辑器不存在');
            }
        }
        
        // 页面加载完成后自动创建编辑器
        window.addEventListener('load', () => {
            log('页面加载完成，准备创建编辑器');
            setTimeout(createEditor, 500);
        });
        
        // 监听页面卸载
        window.addEventListener('beforeunload', () => {
            if (editor) {
                destroyEditor();
            }
        });
    </script>
</body>
</html>
